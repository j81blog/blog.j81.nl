{{ define "main" }}
<div class="wrap">
  <header class="page-head reveal">
    <h1 class="kicker" style="margin-bottom:.9rem;">{{ .Title }}</h1>
  </header>

  <div class="term-grid reveal">
    {{- range .Data.Terms.ByCount }}
    <a class="tag" href="{{ .Page.RelPermalink }}">{{ .Page.Title }}<span class="n">{{ .Count }}</span></a>
    {{- end }}
  </div>
</div>
{{ end }}
