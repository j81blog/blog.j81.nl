{{ define "main" }}
<div class="wrap">
  <header class="page-head reveal">
    <h1 class="kicker" style="margin-bottom:.9rem;">{{ .Title }}</h1>
    {{- with .Description }}<p class="desc">{{ . }}</p>{{ end }}
  </header>

  <div class="reveal">
    {{- range (.Pages.ByDate.Reverse).GroupByParam "group" }}
    <div class="manual-group">
      {{- with .Key }}<h2 class="manual-group-title">{{ . }}</h2>{{ end }}
      {{- range $i, $p := .Pages }}
      <a class="manual-row" href="{{ $p.RelPermalink }}">
        <span class="idx">{{ printf "%02d" (add $i 1) }}</span>
        <span>{{ $p.Title }}</span>
        <span class="chev">→</span>
      </a>
      {{- end }}
    </div>
    {{- end }}
  </div>
</div>
{{ end }}
