<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }} — home">
      <span class="brand-prompt">PS C:\&gt;</span>
      <span>blog.j81.nl</span>
      <span class="brand-cursor" aria-hidden="true"></span>
    </a>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {{- $current := . }}
      {{- range site.Menus.main }}
      <a href="{{ .URL }}"{{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }} aria-current="true"{{ end }}>{{ .Name }}</a>
      {{- end }}
    </nav>

    <div class="header-actions">
      <a class="icon-btn" href="/search/" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg>
      </a>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark / light mode">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      </button>
      <button class="icon-btn nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="site-nav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </div>
  </div>
</header>
