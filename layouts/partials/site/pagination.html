{{- /* Context: a Paginator */ -}}
{{- if gt .TotalPages 1 }}
<nav class="pagination" aria-label="Pagination">
  {{- if .HasPrev }}<a href="{{ .Prev.URL }}" aria-label="Previous page">←</a>{{ end }}
  {{- $cur := . }}
  {{- range .Pagers }}
    {{- if eq .PageNumber $cur.PageNumber }}
  <span class="current" aria-current="page">{{ .PageNumber }}</span>
    {{- else }}
  <a href="{{ .URL }}">{{ .PageNumber }}</a>
    {{- end }}
  {{- end }}
  {{- if .HasNext }}<a href="{{ .Next.URL }}" aria-label="Next page">→</a>{{ end }}
</nav>
{{- end }}
